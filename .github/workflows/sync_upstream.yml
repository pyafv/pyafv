name: Sync fork with upstream

on:
  schedule:
    - cron: "0 0 * * *"   # every day at 00:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # important for rebasing
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/wwang721/pyafv.git
          git fetch upstream main

      - name: Rebase main onto upstream/main
        run: |
          git checkout main
          git rebase upstream/main

      - name: Push rebased main
        env:
          FORK_SYNC_PAT: ${{ secrets.FORK_SYNC_PAT }}
        run: |
          git fetch origin main
          EXPECTED=$(git rev-parse refs/remotes/origin/main)
          git remote set-url origin https://x-access-token:${FORK_SYNC_PAT}@github.com/${{ github.repository }}.git
          git push --force-with-lease=main:${EXPECTED} origin main
